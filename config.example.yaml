# ZDAS configuration
listen: ":18443"                          # address to bind
external_url: "https://das.example.com"   # how tunnelers and the controller reach ZDAS

# Optional: delegate the IdP selector page to the embedding application.
# When set and 2+ providers are registered, ZDAS 302-redirects unsigned
# /authorize requests to this URL with the original query string plus
# `providers=<comma-separated names>`. The host app renders its own
# picker page (matching its branding) and directs the user back to
# /authorize with the same query string plus `idp=<chosen-name>`.
# When unset, ZDAS renders a built-in HTML picker.
# idp_selector_url: "https://app.example.com/enroll/pick-idp"

# TLS - three modes:
#   "none"   - plain HTTP (development, or behind a TLS-terminating reverse proxy)
#   "static" - provide your own cert and key files
#   "acme"   - automatic certs via Let's Encrypt
tls:
  mode: "none"
  # static mode
  # cert_file: "/path/to/cert.pem"
  # key_file: "/path/to/key.pem"
  # acme mode
  # acme:
  #   domains:
  #     - "das.example.com"
  #   cache_dir: "/var/lib/zdas/certs"

# Ziti controller - ZDAS discovers upstream IdPs and manages identities here
controller:
  api_url: "https://controller.example.com:1280"
  # Ziti identity JSON file with admin=true - used for mTLS to the controller
  # and management API access (required for fallback reconciliation).
  # The file contains cert, key, and CA bundle.
  # identity_file: "/path/to/zdas-admin.json"
  # PEM CA bundle for controllers using a private CA (when no identity file).
  # Not needed when the controller has a publicly-trusted cert.
  # ca_bundle: "/path/to/controller-ca.pem"
  poll_interval: "5m"                          # 0 = startup only

# Fallback for unmodified tunnelers that don't send device_name.
# When enabled, ZDAS allows enrollment without device info and reconciles
# the identity name after the tunneler connects and reports envInfo.
fallback:
  enabled: false                              # set true to allow enrollment without device_name
  poll_interval: "10s"                        # how often to check for envInfo on pending identities
  temp_name_template: "{username}-pending-{nonce_short}"
  timeout: "1h"                               # stop tracking after this long

# Directly-configured upstream providers (optional). Most OIDC providers are
# discovered from the controller automatically; use this section for providers
# that aren't registered as ext-jwt-signers (e.g., GitHub) or for embedding
# scenarios where the controller doesn't know about them.
# providers:
#   - type: "github"
#     name: "github"
#     client_id: "Iv1.abc123"
#     client_secret: "secret"          # or use ZDAS_PROVIDER_GITHUB_CLIENT_SECRET env var
#     username_field: "login"          # "login" | "name" | "email"
#     user_id_field: "id"
#     # allowed_orgs:
#     #   - "mycompany"
#   - type: "oidc"
#     name: "google"
#     client_id: "abc.apps.googleusercontent.com"
#     client_secret: "GOCSPX-..."       # required for Google "Web application" clients; optional for other OIDC IdPs
#     oidc_issuer_url: "https://accounts.google.com"
#     # scopes: ["openid", "profile", "email"]   # optional, this is the default

# Claim composition
# Updated tunnelers send device info as query params on /authorize:
#   device_name, hostname, os, arch, os_release, os_version
# Available template placeholders: {username}, {device_name}, {hostname}, {os}, {arch}
claims:
  username_claim: "preferred_username"
  name_template: "{username}-{device_name}"
  identity_name_claim: "device_identity_name"
  external_id_claim: "device_external_id"

# Token settings
token:
  audience: "ziti-enroll"            # must match the audience on the ext-jwt-signer
  expiry: "5m"

# Session settings
session:
  timeout: "10m"
  code_expiry: "60s"

# Per-IP rate limiting on /authorize. Disabled by default (0).
# When enabled, each client IP gets a token bucket with the configured
# sustained rate and burst. Requests over the limit get 429 Too Many Requests.
# rate_limit:
#   authorize_per_second: 10
#   authorize_burst: 20
