# ZDAS configuration
listen: ":18443"                          # address to bind
external_url: "https://das.example.com"   # how tunnelers and the controller reach ZDAS

# TLS - three modes:
#   "none"   - plain HTTP (development, or behind a TLS-terminating reverse proxy)
#   "static" - provide your own cert and key files
#   "acme"   - automatic certs via Let's Encrypt
tls:
  mode: "none"
  # static mode
  # cert_file: "/path/to/cert.pem"
  # key_file: "/path/to/key.pem"
  # acme mode
  # acme:
  #   domains:
  #     - "das.example.com"
  #   cache_dir: "/var/lib/zdas/certs"

# Ziti controller - ZDAS discovers upstream IdPs from here
controller:
  api_url: "https://controller.example.com:1280"
  # ca_file: "/path/to/controller-ca.pem"     # if controller uses a private CA
  poll_interval: "5m"                          # 0 = startup only

# Non-OIDC upstream providers (optional)
# providers:
#   - type: "github"
#     name: "github"
#     client_id: "Iv1.abc123"
#     client_secret: "secret"          # or use ZDAS_PROVIDER_GITHUB_CLIENT_SECRET env var
#     username_field: "login"          # "login" | "name" | "email"
#     user_id_field: "id"
#     # allowed_orgs:
#     #   - "mycompany"

# Claim composition
claims:
  username_claim: "preferred_username"
  name_template: "{username}-{device_name}"
  identity_name_claim: "device_identity_name"
  external_id_claim: "device_external_id"

# Token settings
token:
  audience: "ziti-enrolltocert"
  expiry: "5m"

# Session settings
session:
  timeout: "10m"
  code_expiry: "60s"
